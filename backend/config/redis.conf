# ── FrontierCRM Redis Production Configuration Reference ──────────────────────
# Applied via the Redis service's config or via Fly.io Redis add-on.
#
# This file documents the recommended production Redis settings. It is not
# loaded automatically — apply via redis-cli CONFIG SET or the Fly.io Redis
# dashboard.

# ── Memory Management ─────────────────────────────────────────────────────────
# Max memory: match the Redis plan (Fly.io Redis 250MB / 1GB etc.)
maxmemory 256mb

# Eviction: allkeys-lru evicts least-recently-used keys when memory is full.
# Suitable for a cache + Celery result backend. For pure cache use 'volatile-lru'.
maxmemory-policy allkeys-lru

# ── Persistence ───────────────────────────────────────────────────────────────
# AOF with fsync every second: balances durability with performance.
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots (fallback): save every 5 minutes if 100+ keys changed
save 300 100
save 60 10000

# ── Connection ────────────────────────────────────────────────────────────────
# TLS required when connecting over public internet
# tls-port 6380 (enable for Fly.io Redis)

timeout 300
tcp-keepalive 60
maxclients 100

# ── Safety ────────────────────────────────────────────────────────────────────
# Slow query log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Rename dangerous commands (optional — prevents accidental FLUSHALL in prod)
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""

# ── Celery Broker Config ──────────────────────────────────────────────────────
# Celery uses db 0; Cache uses db 1
# Set via CELERY_BROKER_URL=redis://:password@host:6379/0
# Set via REDIS_URL=redis://:password@host:6379/1

# ── Rate Limiting ─────────────────────────────────────────────────────────────
# DRF throttling uses Redis when DJANGO_REDIS_URL is configured.
# Rate limit counters auto-expire after the rate window.
# See base.py: CACHES config with django-redis backend.