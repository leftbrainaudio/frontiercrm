# ── FrontierCRM Frontend — Nginx SPA Config ──────────────────────────────────
# Serves the React/Vite production build with SPA routing, gzip, and security
# headers. Designed for Docker and Fly.io behind the Fly.io proxy.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── CSP ─────────────────────────────────────────────────────────────────────
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://*.googleusercontent.com;
        font-src 'self';
        connect-src 'self' https://api.frontiercrm.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ── Static assets (long cache, content-hashed filenames) ───────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing: send unknown paths to index.html ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Deny access to dotfiles ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny access to sensitive file types in root ─────────────────────────────
    location ~* \.(env|json|yml|yaml|md|lock)$ {
        deny all;
        return 404;
    }
}