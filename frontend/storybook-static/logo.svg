<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="wordmark-grad-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  
  <!-- Compass-forward arrow mark -->
  <g transform="translate(40, 40)">
    <!-- Outer compass circle -->
    <circle cx="0" cy="0" r="32" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.12"/>
    
    <!-- North arrow (extended, arrowhead shape) -->
    <polygon points="0,-32 8,-12 3,-12 3,-5 -3,-5 -3,-12 -8,-12" fill="#2563EB"/>
    
    <!-- South point -->
    <polygon points="0,20 7,7 -7,7" fill="#2563EB" opacity="0.5"/>
    
    <!-- East point -->
    <polygon points="20,0 7,7 7,-7" fill="#2563EB" opacity="0.7"/>
    
    <!-- West point -->
    <polygon points="-20,0 -7,7 -7,-7" fill="#2563EB" opacity="0.7"/>
    
    <!-- Center diamond -->
    <rect x="-4" y="-4" width="8" height="8" rx="1.5" fill="#2563EB" transform="rotate(45)"/>
    
    <!-- Inner dot -->
    <circle cx="0" cy="0" r="2" fill="#14B8A6"/>
  </g>
  
  <!-- Wordmark -->
  <text x="88" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1E293B" letter-spacing="-0.3">FrontierCRM</text>
</svg>
