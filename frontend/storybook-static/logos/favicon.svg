<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Simplified mark for favicon -->
  <g transform="translate(16, 16)">
    <!-- North arrow (extended arrowhead) -->
    <polygon points="0,-14 3.5,-5 1.5,-5 1.5,-2.5 -1.5,-2.5 -1.5,-5 -3.5,-5" fill="#2563EB"/>
    
    <!-- South point -->
    <polygon points="0,9 3,3 -3,3" fill="#2563EB" opacity="0.5"/>
    
    <!-- East point -->
    <polygon points="9,0 3,3 3,-3" fill="#2563EB" opacity="0.7"/>
    
    <!-- West point -->
    <polygon points="-9,0 -3,3 -3,-3" fill="#2563EB" opacity="0.7"/>
    
    <!-- Center diamond -->
    <rect x="-1.8" y="-1.8" width="3.6" height="3.6" rx="0.6" fill="#2563EB" transform="rotate(45)"/>
    
    <!-- Inner dot -->
    <circle cx="0" cy="0" r="1" fill="#14B8A6"/>
  </g>
</svg>
